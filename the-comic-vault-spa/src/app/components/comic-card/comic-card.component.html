<article class="comic-card" (click)="onViewDetail()" [class.out-of-stock]="!comic.is_available">
  <!-- Image Container -->
  <div class="card-image-wrap">
    <span class="brand-badge badge" [ngClass]="getBrandClass()">{{ comic.brand | uppercase }}</span>
    <img [src]="comicService.imageBaseUrl + '/' + comic.image_url" [alt]="comic.title" class="card-image" loading="lazy" />
    <div class="card-overlay">
      <a [routerLink]="['/details', comic.id]" class="btn btn-yellow overlay-btn" (click)="$event.stopPropagation()">
        View Details
      </a>
    </div>
    <div class="out-of-stock-banner" *ngIf="!comic.is_available">
      SOLD OUT
    </div>
  </div>

  <!-- Card Info -->
  <div class="card-body">
    <h3 class="card-title">{{ comic.title }}</h3>
    <p class="card-meta">
      <span class="card-category">{{ comic.category | uppercase }}</span>
    </p>
    <p class="card-writer">
      <span class="meta-label">Writer:</span> {{ comic.writer }}
    </p>

    <div class="card-footer">
      <span class="card-price">{{ comic.price | currency }}</span>
      <button class="btn-add-cart" [disabled]="!comic.is_available || inCart"
        [ngClass]="{ 'in-cart': inCart, 'disabled': !comic.is_available }" (click)="onAddToCart($event)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          *ngIf="!inCart">
          <circle cx="9" cy="21" r="1" />
          <circle cx="20" cy="21" r="1" />
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
        </svg>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          *ngIf="inCart">
          <polyline points="20 6 9 17 4 12" />
        </svg>
        <span>{{ inCart ? 'Added' : 'Add' }}</span>
      </button>
    </div>
  </div>
</article>
