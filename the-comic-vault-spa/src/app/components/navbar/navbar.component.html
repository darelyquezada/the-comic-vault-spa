<nav class="navbar">
  <div class="nav-inner">
    <!-- Logo -->
    <a routerLink="/home" class="nav-logo">
      <div class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="currentColor"/>
        </svg>
      </div>
      <span class="logo-text">THE COMIC VAULT</span>
    </a>

    <!-- Nav Links -->
    <ul class="nav-links">
      <li>
        <a routerLink="/home" routerLinkActive="active" class="nav-link">Home</a>
      </li>
      <li>
        <a routerLink="/catalog" routerLinkActive="active" class="nav-link">Catalog</a>
      </li>
      <li>
        <a routerLink="/add-comic" routerLinkActive="active" class="nav-link nav-link-add">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
          </svg>
          Add Comic
        </a>
      </li>
      <li>
        <a routerLink="/cart" class="nav-cart-btn" [class.has-items]="cartCount() > 0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span>Cart</span>
          <span class="cart-badge" *ngIf="cartCount() > 0">{{ cartCount() }}</span> <!-- Cart Count Badge-->
        </a>
      </li>
    </ul>
  </div>
</nav>
