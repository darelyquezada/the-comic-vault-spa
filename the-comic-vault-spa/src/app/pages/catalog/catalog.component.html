<div class="catalog-page">
  <div class="catalog-header">
    <div class="container">
      <h1 class="section-title">COMIC CATALOG</h1>
      <p class="catalog-subtitle">Browse our extensive collection of comics from the best publishers in the industry.</p>
    </div>
  </div>

  <div class="container catalog-layout">
    <aside class="filters-panel">
      <div class="filters-header">
        <h2>FILTERS</h2>
        <button class="clear-btn" (click)="clearFilters()" *ngIf="selectedBrand() || selectedCategory() || searchQuery()">
          Clear All
        </button>
      </div>

      <div class="filter-search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          placeholder="Search by title..."
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event)"
          class="search-input"
        />
      </div>

      <div class="filter-group">
        <h3 class="filter-label">PUBLISHERS</h3>
        <div class="filter-tags">
          <button
            *ngFor="let brand of brands"
            class="filter-tag"
            [ngClass]="{ 'active': selectedBrand() === brand, 'tag-marvel': brand === 'MARVEL', 'tag-dc': brand === 'DC', 'tag-image': brand === 'IMAGE' }"
            (click)="toggleBrand(brand)"
          >
            {{ brand }}
          </button>
        </div>
      </div>

      <div class="filter-group">
        <h3 class="filter-label">CATEGORIES</h3>
        <div class="filter-tags">
          <button
            *ngFor="let cat of categories"
            class="filter-tag"
            [ngClass]="{ 'active': selectedCategory() === cat }"
            (click)="toggleCategory(cat)"
          >
            {{ cat | uppercase }}
          </button>
        </div>
      </div>
    </aside>

    <div class="catalog-content">
      <div class="results-bar">
        <span class="results-count">
          <strong>{{ filteredComics().length }}</strong> COMICS FOUND
        </span>
      </div>

      <div class="loading-grid" *ngIf="isLoading">
        <div class="skeleton-card" *ngFor="let i of [1,2,3,4,5,6,7,8,9]"></div>
      </div>

      <div class="empty-state" *ngIf="!isLoading && filteredComics().length === 0">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <h3>No comics found</h3>
        <p>Try adjusting your filters or search query.</p>
        <button class="btn btn-red" (click)="clearFilters()">Clear Filters</button>
      </div>

      <div class="comics-grid" *ngIf="!isLoading && filteredComics().length > 0">
        <app-comic-card
          *ngFor="let comic of filteredComics()"
          [comic]="comic"
          [inCart]="isInCart(comic)"
          (addToCart)="onAddToCart($event)"
          (viewDetail)="onViewDetail($event)"
        ></app-comic-card>
      </div>
    </div>
  </div>
</div>
